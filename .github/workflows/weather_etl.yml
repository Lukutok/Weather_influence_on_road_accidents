name: Everyday weather

on:
  schedule:
    # Запуск каждый день в 03:00 UTC (примерно 06:00 по Москве)
    # Это гарантирует, что данные за вчерашний день уже готовы в API
    - cron: '5 11 * * *'
  workflow_dispatch: # Позволяет запустить вручную кнопку "Run workflow" для тестов

jobs:
  run-weather-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ETL Script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python main.py
