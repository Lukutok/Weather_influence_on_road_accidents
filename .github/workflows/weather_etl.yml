name: Everyday weather

on:
  schedule:
    # '53 9 * * *' - это 11:05 UTC
    - cron: '5 10 * * *'
  workflow_dispatch:
    # Оставляем пустым для возможности ручного запуска

jobs:
  run-weather-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ETL Script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python main.py
